<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenPomodoro — Deep Focus Timer</title>
  <meta name="description" content="A premium, state-of-the-art Pomodoro timer designed to help you concentrate, featuring glassmorphism layout, dynamic ambient modes, and synthesized audio.">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="mode-focus">

  <!-- Celebration Confetti Layer -->
  <canvas id="confetti-canvas"></canvas>

  <main class="container">
    
    <!-- Header Area -->
    <header>
      <div class="brand">
        <!-- Custom organic modern ZenPomodoro Logo SVG -->
        <svg class="brand-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2C11.45 2 11 2.45 11 3V4.07C7.6 4.5 5 7.4 5 11C5 12.87 5.67 14.58 6.78 15.91L5.29 17.4C4.9 17.79 4.9 18.42 5.29 18.81C5.68 19.2 6.31 19.2 6.7 18.81L8.19 17.32C9.28 18.06 10.59 18.5 12 18.5C13.41 18.5 14.72 18.06 15.81 17.32L17.3 18.81C17.69 19.2 18.32 19.2 18.71 18.81C19.1 18.42 19.1 17.79 18.71 17.4L17.22 15.91C18.33 14.58 19 12.87 19 11C19 7.4 16.4 4.5 13 4.07V3C13 2.45 12.55 2 12 2ZM12 6C14.76 6 17 8.24 17 11C17 13.76 14.76 16 12 16C9.24 16 7 13.76 7 11C7 8.24 9.24 6 12 6ZM12 8C10.34 8 9 9.34 9 11C9 11.55 9.45 12 10 12C10.55 12 11 11.55 11 11C11 10.45 11.45 10 12 10C12.55 10 13 10.45 13 11C13 11.83 12.17 13 11.34 13.5C10.67 13.9 10 14.67 10 15.5C10 16.05 10.45 16.5 11 16.5C11.55 16.5 12 16.05 12 15.5C12 15.17 12.33 14.9 12.66 14.7C13.66 14.1 15 12.83 15 11C15 9.34 13.66 8 12 8Z"/>
        </svg>
        <h1>ZenPomodoro</h1>
      </div>
      
      <div class="daily-progress" aria-live="polite">
        Daily Progress: <span id="progress-badge">0 / 4</span>
      </div>
    </header>

    <!-- Main Active Timer Pane -->
    <section class="glass-panel timer-section" aria-label="Timer Console">
      <div class="timer-pulse-bg"></div>
      
      <div class="timer-circle-wrapper">
        <svg class="timer-svg" viewBox="0 0 300 300">
          <circle class="timer-track" cx="150" cy="150" r="140"></circle>
          <circle id="progress-circle" class="timer-progress" cx="150" cy="150" r="140"></circle>
        </svg>
        
        <div class="timer-info-container">
          <time id="timer-display" class="timer-time" datetime="PT25M">25:00</time>
          <div id="timer-status" class="timer-status">Focus Session</div>
        </div>
      </div>

      <!-- Play, Pause and Reset Buttons -->
      <div class="timer-controls">
        <button id="btn-play-pause" class="btn btn-primary" aria-label="Start Timer">
          <!-- Play Icon -->
          <svg id="icon-play" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <!-- Pause Icon (hidden initially) -->
          <svg id="icon-pause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        
        <button id="btn-reset" class="btn btn-secondary" aria-label="Reset Timer">
          <!-- Reset Arrow Icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6 0 2.97-2.17 5.43-5 5.91v2.02c3.95-.49 7-3.85 7-7.93 0-4.42-3.58-8-8-8zm-5.5 8c0-1.52.57-2.91 1.5-3.98L6.58 7.6C5.21 9.07 4.5 11 4.5 13c0 4.08 3.05 7.44 7 7.93v-2.02c-2.83-.48-5-2.94-5-5.91z"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Configuration Settings & History Side Panel -->
    <aside class="sidebar">
      
      <!-- Settings Panel -->
      <section class="glass-panel config-group" aria-labelledby="settings-title">
        <h2 id="settings-title" class="sidebar-title">
          <!-- Cog SVG -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.07-3-3s1.07-3 3-3 3 1.07 3 3-1.07 3-3 3z"/>
          </svg>
          Configuration
        </h2>
        
        <!-- Focus Slider -->
        <div class="config-row">
          <div class="config-label-row">
            <label for="focus-slider" class="config-label">Focus Duration</label>
            <span id="focus-val" class="config-value">25m</span>
          </div>
          <input type="range" id="focus-slider" class="slider" min="1" max="60" value="25" aria-valuemin="1" aria-valuemax="60" aria-valuenow="25">
        </div>

        <!-- Break Slider -->
        <div class="config-row">
          <div class="config-label-row">
            <label for="break-slider" class="config-label">Break Duration</label>
            <span id="break-val" class="config-value">5m</span>
          </div>
          <input type="range" id="break-slider" class="slider" min="1" max="30" value="5" aria-valuemin="1" aria-valuemax="30" aria-valuenow="5">
        </div>

        <!-- Ambient white-noise player (Zen Atmosphere) -->
        <div class="sound-toggle-row">
          <span class="config-label" style="display: flex; align-items: center; gap: 0.4rem;">
            <!-- Soundwave SVG -->
            <svg style="width: 1.1rem; height: 1.1rem; fill: currentColor;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 3v18c-4.97 0-9-4.03-9-9s4.03-9 9-9zm0-2C5.93 1 1 5.93 1 12s4.93 11 11 11 11-4.93 11-11S18.07 1 12 1zm3 8.35c.83.67 1.34 1.7 1.34 2.85s-.51 2.18-1.34 2.85V9.35z"/>
            </svg>
            Ambient Brown Noise
          </span>
          <label class="checkbox-container" aria-label="Toggle Ambient Audio">
            <input type="checkbox" id="toggle-ambient">
            <span class="slider-toggle"></span>
          </label>
        </div>

        <!-- Audio Alert Toggle -->
        <div class="sound-toggle-row">
          <span class="config-label" style="display: flex; align-items: center; gap: 0.4rem;">
            <!-- Bell SVG -->
            <svg style="width: 1.1rem; height: 1.1rem; fill: currentColor;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
            </svg>
            Cycle Done Chime
          </span>
          <label class="checkbox-container" aria-label="Toggle Audio Chime">
            <input type="checkbox" id="toggle-audio" checked>
            <span class="slider-toggle"></span>
          </label>
        </div>
      </section>

      <!-- History Card -->
      <section class="glass-panel history-section" aria-labelledby="history-title">
        <div class="history-header-row">
          <h2 id="history-title" class="sidebar-title" style="margin-bottom: 0;">
            <!-- Calendar Check SVG -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7v-5z"/>
            </svg>
            Today's Log
          </h2>
          <button id="btn-clear-history" class="btn-clear" aria-label="Clear Daily History">Clear</button>
        </div>

        <ul id="history-list" class="history-list">
          <!-- Dynamic logs injected by JS -->
          <li class="history-empty">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
            </svg>
            <span>No focus sessions completed today.</span>
          </li>
        </ul>
      </section>
      
    </aside>

    <!-- Footer -->
    <footer class="credits">
      Designed with 💜 by Antigravity
    </footer>

  </main>

  <script src="app.js" defer></script>
</body>
</html>
